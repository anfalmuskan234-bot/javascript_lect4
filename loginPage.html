<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .login-box{
            background:#fff;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
            width:350px;
            text-align:center;
        }

        .login-box h2{
            margin-bottom:20px;
        }

        .input-box{
            margin-bottom:15px;
            text-align:left;
        }

        .input-box label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }

        .input-box input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:10px;
            background:#4facfe;
            color:#fff;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2196f3;
        }

        .links{
            margin-top:15px;
        }

        .links a{
            text-decoration:none;
            color:#4facfe;
            font-size:14px;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>
<script>
    console.log("Anfal")
    if{
        var a=10;
        Console.log(a)
    }
    Console.log(a)
</script>

<div class="login-box">
    <h2>Login</h2>

    <form action="#">
        <div class="input-box">
            <label>Username</label>
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Password" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" placeholder="Email" required>
        </div>

        <button type="submit">Login</button>

        <div class="links">
            <a href="#">Forgot Password?</a>
        </div>
    </form>

</div>

</body>
</html>
